<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>領地勢力図シミュレーター</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; text-align: center; overflow-x: hidden; }
        #header { background: #222; padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #444; }
        #map-container { position: relative; display: inline-block; margin: 10px auto; line-height: 0; cursor: crosshair; background: #fff; }
        /* 描画用のメインキャンバス */
        #mapCanvas { display: block; max-width: 100%; height: auto; position: relative; z-index: 10; }
        /* UI */
        .controls { background: #2a2a2a; padding: 10px; border-bottom: 1px solid #444; }
        .color-palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin: 10px 0; }
        .color-item { width: 36px; height: 36px; border-radius: 6px; cursor: pointer; border: 2px solid #555; }
        .color-item.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px white; }
        #score-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; min-height: 30px; }
        .score-card { background: #444; padding: 5px 12px; border-radius: 5px; font-size: 0.9em; border-left: 5px solid transparent; }
        .btn-reset { background: #600; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>

<div id="header">
    <div id="score-board">画像読み込み中...</div>
</div>

<div class="controls">
    <div class="color-palette" id="palette"></div>
    <button class="btn-reset" onclick="resetMap()">地図をリセット</button>
</div>

<div id="map-container">
    <img id="baseImg" src="img/image.png" style="width:100%; position:absolute; top:0; left:0; z-index:1;">
    <canvas id="mapCanvas"></canvas>
</div>

<script>
    const mapMasterData = [/* 161個のデータ */];
    const pointsConfig = { 7: 6000, 6: 4000, 5: 3000, 4: 2000, 3: 600, 2: 200, 1: 100 };
    const colorList = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990', '#dcbeff', '#9A6324', '#fffac8', '#800000', '#aaffc3', '#808000', '#ffd8b1', '#000075', '#a9a9a9'];

    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    let selectedColor = colorList[0];
    let scores = {};
    let areaStatus = {}; // エリアごとの現在の色を記録
    let imgMask = new Image(); // あなたが作った透過線画
    let imgBaseLoaded = false;
    let imgMaskLoaded = false;

    // 画像の読み込み（セキュリティ設定を追加）
    const baseImgTag = document.getElementById('baseImg');
    baseImgTag.onload = () => { imgBaseLoaded = true; checkLoaded(); };
    imgMask.onload = () => { imgMaskLoaded = true; checkLoaded(); };

    // imgフォルダ内の画像を参照
    imgMask.src = 'img/mask.png?'; // あなたが作った透過線画
    
    // セキュリティ制限（CORS）を回避するための記述
    baseImgTag.setAttribute('crossOrigin', 'anonymous');
    imgMask.crossOrigin = 'anonymous';

    function checkLoaded() {
        if (imgBaseLoaded && imgMaskLoaded) init();
    }

    function init() {
        // キャンバスのサイズを元の画像の解像度に合わせる
        canvas.width = baseImgTag.naturalWidth;
        canvas.height = baseImgTag.naturalHeight;
        colorList.forEach(c => scores[c] = 0);
        
        // パレット生成
        const palette = document.getElementById('palette');
        colorList.forEach((color, i) => {
            const item = document.createElement('div');
            item.className = 'color-item' + (i === 0 ? ' active' : '');
            item.style.backgroundColor = color;
            item.onclick = () => {
                document.querySelectorAll('.color-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                selectedColor = color;
            };
            palette.appendChild(item);
        });

        // 初期状態で線だけを表示
        render();
        updateBoard();
    }

    function render() {
        // キャンバスは常に透過させて、下のbaseImgが見えるようにする
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // ここに塗られた色を合成していく処理を追加（※今回は簡易化）
        ctx.drawImage(imgMask, 0, 0); 
    }

    canvas.onclick = function(e) {
        if (!imgMaskLoaded) return;
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
        const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));

        // クリックした場所の近くのエリア座標を探す
        let nearest = null;
        let minDist = 30; // 判定距離
        mapMasterData.forEach(p => {
            const px = (p.x * canvas.width / 100);
            const py = (p.y * canvas.height / 100);
            const d = Math.sqrt((px-x)**2 + (py-y)**2);
            if (d < minDist) { minDist = d; nearest = p; }
        });

        if (nearest) {
            const key = `${nearest.x}-${nearest.y}`;
            const targetRGB = hexToRgb(selectedColor);
            
            // 【重要】バケツ塗り実行：判定は imgMask（線画）で行う
            floodFillOnMask(x, y, targetRGB);
            
            // スコア更新
            if (areaStatus[key] !== selectedColor) {
                if (areaStatus[key]) scores[areaStatus[key]] -= pointsConfig[nearest.lv];
                scores[selectedColor] += pointsConfig[nearest.lv];
                areaStatus[key] = selectedColor;
                updateBoard();
            }
            // 線を常に一番上に表示
            ctx.drawImage(imgMask, 0, 0);
        }
    };

    // 【重要】透過線画のみを判定対象とするバケツ塗りエンジン
    function floodFillOnMask(startX, startY, fillRGB) {
        // maskImgの色データだけを取得するキャンバス
        const offscreen = document.createElement('canvas');
        offscreen.width = canvas.width;
        offscreen.height = canvas.height;
        const oCtx = offscreen.getContext('2d');
        oCtx.drawImage(imgMask, 0, 0);
        const oImageData = oCtx.getImageData(0, 0, canvas.width, canvas.height);
        const oPixels = oImageData.data;

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imageData.data;
        const width = canvas.width;
        const height = canvas.height;

        const startPos = (startY * width + startX) * 4;
        
        // 黒い線（境界線）や透過部分（α=0）をクリックしたら塗らない
        if (oPixels[startPos + 3] === 0 || isBoundary(oPixels[startPos], oPixels[startPos+1], oPixels[startPos+2])) return;

        const stack = [[startX, startY]];
        while (stack.length) {
            const [x, y] = stack.pop();
            const pos = (y * width + x) * 4;
            
            // すでに塗られていたら飛ばす（重複防止）
            if (pixels[pos + 3] > 0) continue;

            // 塗る
            pixels[pos] = fillRGB.r;
            pixels[pos+1] = fillRGB.g;
            pixels[pos+2] = fillRGB.b;
            pixels[pos+3] = 180; // 透明度（数字が見えるように）

            if (x > 0) checkNext(x - 1, y, startX, startY);
            if (x < width - 1) checkNext(x + 1, y, startX, startY);
            if (y > 0) checkNext(x, y - 1, startX, startY);
            if (y < height - 1) checkNext(x, y + 1, startX, startY);
        }
        ctx.putImageData(imageData, 0, 0);

        // 次のピクセルが境界線の中（透過）で、まだ塗られていないかチェック
        function checkNext(x, y, sx, sy) {
            const pos = (y * width + x) * 4;
            // maskImgで黒い線（境界線）でなければスタックに積む
            if (oPixels[pos + 3] > 0 && !isBoundary(oPixels[pos], oPixels[pos+1], oPixels[pos+2])) {
                stack.push([x, y]);
            }
        }
    }

    // 暗い色（境界線）か判定
    function isBoundary(r, g, b) {
        return r < 120 && g < 120 && b < 120;
    }

    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
    }

    function updateBoard() {
        const board = document.getElementById('score-board');
        board.innerHTML = '';
        let has = false;
        colorList.forEach(c => {
            if (scores[c] > 0) {
                has = true;
                const card = document.createElement('div');
                card.className = 'score-card';
                card.style.borderLeftColor = c;
                card.innerHTML = `<b>${scores[c].toLocaleString()}</b> pt`;
                board.appendChild(card);
            }
        });
        if (!has) board.innerHTML = '領地をタップして占領！';
    }

    function resetMap() {
        if (confirm('リセットしますか？')) location.reload();
    }
</script>
</body>
</html>
