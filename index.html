<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>領地勢力図シミュレーター【エリア完封塗り版】</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; text-align: center; }
        #header { background: #333; padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #444; }
        #map-container { position: relative; display: inline-block; margin: 10px auto; background: #000; line-height: 0; cursor: pointer; }
        #map-image { display: block; max-width: 100%; height: auto; }
        
        /* エリアごとの塗りつぶしレイヤー */
        .area-layer {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            /* あなたが作った線画をマスクに使用 */
            -webkit-mask-image: url('img/mask.png');
            mask-image: url('img/mask.png');
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
            -webkit-mask-mode: luminance;
            mask-mode: luminance;
            
            pointer-events: none; /* クリックは下のコンテナで拾う */
            opacity: 0;
            z-index: 5;
        }

        /* 塗りつぶし範囲を制限するクリップ（ここが魔法の正体） */
        .area-layer.active {
            opacity: 0.7;
        }

        .controls { background: #2a2a2a; padding: 15px; border-bottom: 1px solid #444; }
        .color-palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .color-item { width: 34px; height: 34px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
        .color-item.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px white; }
        #score-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; background: #222; }
        .score-card { background: #333; padding: 8px 12px; border-radius: 6px; font-size: 0.9em; display: flex; align-items: center; gap: 10px; border-left: 5px solid transparent; }
    </style>
</head>

<div id="header">
    <div id="score-board"></div>
</div>

    <div class="color-palette" id="palette"></div>
    <button onclick="resetMap()" style="background:#600; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">全クリア</button>
</div>

<div id="map-container" id="container">

</div>

    const pointsConfig = { 7: 6000, 6: 4000, 5: 3000, 4: 2000, 3: 600, 2: 200, 1: 100 };
    const colorList = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990', '#dcbeff', '#9A6324', '#fffac8', '#800000', '#aaffc3', '#808000', '#ffd8b1', '#000075', '#a9a9a9'];

    let selectedColor = colorList[0];
    let scores = {};
    const container = document.getElementById('map-container');
    const board = document.getElementById('score-board');

    // 初期化
    colorList.forEach(c => scores[c] = 0);
    colorList.forEach((color, i) => {
        const item = document.createElement('div');
        item.className = 'color-item' + (i === 0 ? ' active' : '');
        item.style.backgroundColor = color;
        item.onclick = () => {
            document.querySelectorAll('.color-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            selectedColor = color;
        };
        document.getElementById('palette').appendChild(item);
    });

    // ★魔法の処理：エリアごとの「部分マスク」を作る
    mapMasterData.forEach(data => {
        const layer = document.createElement('div');
        layer.id = `layer-${data.x}-${data.y}`;
        layer.className = 'area-layer';
        layer.style.backgroundColor = selectedColor;
        
        // 座標周辺だけを表示するようにクリップ（ここがミソ！）
        // エリアの大きさ（だいたい5%〜8%くらい）で切り抜く
        const size = 6.5; 
        layer.style.clipPath = `circle(${size}% at ${data.x}% ${data.y}%)`;
        
        container.appendChild(layer);
    });

    container.addEventListener('click', (e) => {
        const rect = container.getBoundingClientRect();
        const clickX = ((e.clientX - rect.left) / rect.width) * 100;
        const clickY = ((e.clientY - rect.top) / rect.height) * 100;
        let nearest = null; let minDist = 4.0;
        mapMasterData.forEach(data => {
            const dist = Math.sqrt(Math.pow(data.x - clickX, 2) + Math.pow(data.y - clickY, 2));
            if (dist < minDist) { minDist = dist; nearest = data; }
        });
        if (nearest) toggleArea(nearest);
    });

    function toggleArea(data) {
        const layer = document.getElementById(`layer-${data.x}-${data.y}`);
        const key = `${data.x}-${data.y}`;
        
        if (layer.classList.contains('active')) {
            const oldColor = layer.getAttribute('data-color');
            scores[oldColor] -= pointsConfig[data.lv];
            layer.classList.remove('active');
        } else {
            layer.style.backgroundColor = selectedColor;
            layer.setAttribute('data-color', selectedColor);
            scores[selectedColor] = (scores[selectedColor] || 0) + pointsConfig[data.lv];
            layer.classList.add('active');
        }
        refreshBoard();
    }

    function refreshBoard() {
        board.innerHTML = '';
        colorList.forEach(color => {
            if (scores[color] > 0) {
                const card = document.createElement('div');
                card.className = 'score-card';
                card.style.borderLeftColor = color;
                card.innerHTML = `<span style="background:${color}; width:14px; height:14px; border-radius:3px;"></span> <b>${scores[color].toLocaleString()}</b> pt`;
                board.appendChild(card);
            }
        });
    }

    function resetMap() {
        if(!confirm('リセットしますか？')) return;
        document.querySelectorAll('.area-layer').forEach(l => l.classList.remove('active'));
        colorList.forEach(c => scores[c] = 0);
        refreshBoard();
    }
