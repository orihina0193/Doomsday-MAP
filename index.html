<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>領地勢力図シミュレーター【内側完封塗り版】</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; text-align: center; }
        #header { background: #333; padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #444; }
        #map-container { position: relative; display: inline-block; margin: 10px auto; background: #fff; line-height: 0; cursor: pointer; }
        
        /* 1. ベースの地図（一番下） */
        #map-image { display: block; max-width: 100%; height: auto; position: relative; z-index: 1; }
        
        /* 2. 色のレイヤー（真ん中：少し大きめの丸） */
        .area-color-box {
            position: absolute;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .area-color-box.active {
            opacity: 0.5; /* 地図の数字が見えるように少し透かす */
        }

        /* 3. 自作のステンシル画像（一番上：ここが肝！） */
        #line-overlay {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            z-index: 10; 
            pointer-events: none; /* クリックを下の画像に通す */
        }

        /* 調整用パレットなど */
        .controls { background: #2a2a2a; padding: 15px; border-bottom: 1px solid #444; }
        .color-palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .color-item { width: 34px; height: 34px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
        .color-item.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px white; }
        #score-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; background: #222; }
        .score-card { background: #333; padding: 8px 12px; border-radius: 6px; font-size: 0.9em; display: flex; align-items: center; gap: 10px; border-left: 5px solid transparent; }
    </style>
</head>
<body>

<div id="header">
    <div id="score-board"></div>
</div>

<div class="controls">
    <div class="color-palette" id="palette"></div>
    <button onclick="resetMap()" style="background:#600; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">全クリア</button>
</div>

<div id="map-container" onclick="handleMapClick(event)">
    <img id="map-image" src="img/image.png"> <img id="line-overlay" src="img/mask.png"> </div>

<script>
    // 座標データ（中略：160箇所分）
    const mapMasterData = [/* ...お手元のデータをここに... */];
    const pointsConfig = { 7: 6000, 6: 4000, 5: 3000, 4: 2000, 3: 600, 2: 200, 1: 100 };
    const colorList = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990', '#dcbeff', '#9A6324', '#fffac8', '#800000', '#aaffc3', '#808000', '#ffd8b1', '#000075', '#a9a9a9'];

    let selectedColor = colorList[0];
    let scores = {};
    const container = document.getElementById('map-container');
    const board = document.getElementById('score-board');

    // 初期化：エリアごとに「少し大きめの丸」を生成
    mapMasterData.forEach(data => {
        const box = document.createElement('div');
        box.id = `box-${data.x}-${data.y}`;
        box.className = 'area-color-box';
        box.style.width = '100%'; box.style.height = '100%';
        box.style.top = '0'; box.style.left = '0';
        
        // 丸のサイズを 5.5% から少し広げて 7% くらいにすると隙間が埋まりやすいです
        const r = 7.0; 
        box.style.clipPath = `circle(${r}% at ${data.x}% ${data.y}%)`;
        container.insertBefore(box, document.getElementById('line-overlay'));
    });

    // パレット・点数計算・クリック処理（以前のロジックと同じ）
    // ...
</script>
</body>
</html>
