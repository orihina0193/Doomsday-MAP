<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>領地勢力図シミュレーター【完璧塗りつぶし版】</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; text-align: center; overflow-x: hidden; }
        #header { background: #333; padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #444; }
        
        #map-container { position: relative; display: inline-block; margin: 10px auto; background: #000; line-height: 0; overflow: hidden; user-select: none; }
        #map-image { display: block; max-width: 100%; height: auto; opacity: 1; user-select: none; -webkit-user-drag: none; }
        
        /* 完璧塗りつぶし用のタイル（ここが重要！） */
        .tile { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            top: 0; 
            left: 0;
            
            /* マスク画像の読み込みと設定 */
            -webkit-mask-image: url('img/mask.png');
            mask-image: url('img/mask.png');
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;

            /* マスク画像の「白」の部分を透過させる設定 */
            -webkit-mask-mode: luminance;
            mask-mode: luminance;
            
            pointer-events: none; /* 下の画像をクリックできるようにする */
            z-index: 5; /* 画像の上に表示 */
            opacity: 0; /* 初期状態は透明 */
            transition: opacity 0.1s;
        }

        .tile.active {
            opacity: 0.7; /* タップされたら不透明にして色を表示 */
        }

        .controls { background: #2a2a2a; padding: 15px; border-bottom: 1px solid #444; }
        .color-palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 500px; margin: 0 auto 10px; }
        .color-item { width: 34px; height: 34px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
        .color-item.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px white; }

        #score-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; background: #222; }
        .score-card { background: #333; padding: 8px 12px; border-radius: 6px; font-size: 0.9em; display: flex; align-items: center; gap: 10px; border-left: 5px solid transparent; }
        
        .btn-group { margin-top: 10px; }
        button { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .reset-btn { background: #600; color: white; }
    </style>
</head>
<body>

<div id="header">
    <div style="margin-bottom: 5px; font-weight: bold;">完璧塗りつぶし！勢力別ポイント集計</div>
    <div id="score-board"></div>
</div>

<div class="controls">
    <div style="font-size: 0.8em; color: #aaa; margin-bottom: 8px;">色を選択してマップのエリアをタップ</div>
    <div class="color-palette" id="palette"></div>
    <div class="btn-group">
        <button class="reset-btn" onclick="resetMap()">全クリア</button>
    </div>
</div>

<div id="map-container">
    <img id="map-image" src="img/image.png" alt="Map">
    </div>

<script>
    // 前回の座標マスターデータ
    const mapMasterData = [{"x":18.26,"y":11.03,"lv":1},{"x":25.97,"y":11.03,"lv":1},...（中略）...,{"x":50.12,"y":49.93,"lv":7}];

    const pointsConfig = { 7: 6000, 6: 4000, 5: 3000, 4: 2000, 3: 600, 2: 200, 1: 100 };
    const colorList = [
        '#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', 
        '#911eb4', '#42d4f4', '#f032e6', '#bfef45', '#fabed4', 
        '#469990', '#dcbeff', '#9A6324', '#fffac8', '#800000', 
        '#aaffc3', '#808000', '#ffd8b1', '#000075', '#a9a9a9'
    ];

    let selectedColor = colorList[0];
    let scores = {}; // 色ごとの合計点

    const palette = document.getElementById('palette');
    const board = document.getElementById('score-board');
    const container = document.getElementById('map-container');

    // 初期化
    colorList.forEach(c => scores[c] = 0);
    colorList.forEach((color, i) => {
        const item = document.createElement('div');
        item.className = 'color-item' + (i === 0 ? ' active' : '');
        item.style.backgroundColor = color;
        item.onclick = () => {
            document.querySelectorAll('.color-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            selectedColor = color;
        };
        palette.appendChild(item);
    });

    // ★重要: 各座標に対応する塗りつぶしタイルを事前に生成する
    mapMasterData.forEach(data => {
        const tile = document.createElement('div');
        const key = `${data.x}-${data.y}`;
        tile.id = `tile-${key}`;
        tile.className = 'tile';
        tile.style.backgroundColor = selectedColor; // 初期色は選択中の色
        container.appendChild(tile);
    });

    // マップクリック時の自動判定と塗りつぶし
    container.addEventListener('click', (e) => {
        const rect = container.getBoundingClientRect();
        const clickX = ((e.clientX - rect.left) / rect.width) * 100;
        const clickY = ((e.clientY - rect.top) / rect.height) * 100;

        // 一番近い登録ポイントを探す（誤差5%以内）
        let nearest = null;
        let minDist = 5.0; 

        mapMasterData.forEach(data => {
            const dist = Math.sqrt(Math.pow(data.x - clickX, 2) + Math.pow(data.y - clickY, 2));
            if (dist < minDist) {
                minDist = dist;
                nearest = data;
            }
        });

        if (nearest) {
            toggleArea(nearest);
        }
    });

    function toggleArea(data) {
        const key = `${data.x}-${data.y}`;
        const tile = document.getElementById(`tile-${key}`);

        if (tile.classList.contains('active')) {
            // すでに塗られている場合は削除（ポイント減算）
            const oldColor = tile.style.backgroundColor;
            updateScore(oldColor, -pointsConfig[data.lv]);
            tile.classList.remove('active');
            tile.style.backgroundColor = ''; // 色をクリア
        } else {
            // 新しく塗る（ポイント加算）
            tile.style.backgroundColor = selectedColor; // 選択中の色を反映
            tile.classList.add('active');
            updateScore(selectedColor, pointsConfig[data.lv]);
        }
    }

    function updateScore(color, pt) {
        scores[color] += pt;
        refreshBoard();
    }

    function refreshBoard() {
        board.innerHTML = '';
        colorList.forEach(color => {
            if (scores[color] !== 0) {
                const card = document.createElement('div');
                card.className = 'score-card';
                card.style.borderLeftColor = color;
                card.innerHTML = `<span style="background:${color}; width:14px; height:14px; border-radius:3px;"></span> <b>${scores[color].toLocaleString()}</b> pt`;
                board.appendChild(card);
            }
        });
    }

    function resetMap() {
        if(!confirm('全ての塗りを消去しますか？')) return;
        document.querySelectorAll('.tile').forEach(t => {
            t.classList.remove('active');
            t.style.backgroundColor = '';
        });
        colorList.forEach(c => scores[c] = 0);
        refreshBoard();
    }
</script>

</body>
</html>
