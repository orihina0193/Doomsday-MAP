<html lang="ja">
<head>

    <title>精密領地シミュレーター（バケツ塗り版）</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; text-align: center; overflow-x: hidden; }
        #header { background: #222; padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #444; }
        #map-container { position: relative; display: inline-block; margin: 10px auto; line-height: 0; cursor: crosshair; }
        canvas { display: block; max-width: 100%; height: auto; background: #fff; }
        .controls { background: #2a2a2a; padding: 10px; border-bottom: 1px solid #444; }
        .color-palette { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin: 10px 0; }
        .color-item { width: 36px; height: 36px; border-radius: 6px; cursor: pointer; border: 2px solid #555; }
        .color-item.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px white; }
        #score-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; min-height: 30px; }
        .score-card { background: #444; padding: 5px 12px; border-radius: 5px; font-size: 0.9em; border-left: 5px solid transparent; }
        .btn-reset { background: #600; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 10px; }

</div>

<div class="controls">
    <div class="color-palette" id="palette"></div>
    <button class="btn-reset" onclick="resetMap()">地図をリセット</button>

<div id="map-container">

},{"x":57.97,"y":29.01,"lv":3},{"x":65.9,"y":28.15,"lv":3},{"x":43.72,"y":65.69,"lv":4},{"x":55.79,"y":66.62,"lv":4},{"x":66.19,"y":58.6,"lv":4},{"x":33.97,"y":57.09,"lv":4},{"x":34.04,"y":42.91,"lv":4},{"x":42.7,"y":34.24,"lv":4},{"x":57.83,"y":34.6,"lv":4},{"x":65.39,"y":46.49,"lv":4},{"x":41.61,"y":58.67,"lv":5},{"x":41.46,"y":42.41,"lv":5},{"x":58.92,"y":42.62,"lv":5},{"x":59.28,"y":59.17,"lv":5},{"x":50.84,"y":58.6,"lv":6},{"x":49.75,"y":41.55,"lv":6},{"x":50.12,"y":49.93,"lv":7}];
    const pointsConfig = { 7: 6000, 6: 4000, 5: 3000, 4: 2000, 3: 600, 2: 200, 1: 100 };
    const colorList = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990', '#dcbeff', '#9A6324', '#fffac8', '#800000', '#aaffc3', '#808000', '#ffd8b1', '#000075', '#a9a9a9'];

    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    let selectedColor = colorList[0];
    let scores = {};
    let areaStatus = {}; // エリアごとの現在の色を記録
    let imgBase = new Image();
    let imgMask = new Image();
    let loaded = 0;

    // 画像読み込み
    imgBase.src = 'img/image.png';
    imgMask.src = 'img/mask.png'; 
    imgBase.crossOrigin = "Anonymous";
    imgMask.crossOrigin = "Anonymous";

    imgBase.onload = imgMask.onload = () => {
        if (++loaded === 2) init();
    };

    function init() {
        canvas.width = imgBase.width;
        canvas.height = imgBase.height;
        colorList.forEach(c => scores[c] = 0);
        
        // パレット生成
        const palette = document.getElementById('palette');
        colorList.forEach((color, i) => {
            const item = document.createElement('div');
            item.className = 'color-item' + (i === 0 ? ' active' : '');
            item.style.backgroundColor = color;
            item.onclick = () => {
                document.querySelectorAll('.color-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                selectedColor = color;
            };
            palette.appendChild(item);
        });

        render();
        updateBoard();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(imgBase, 0, 0);
        // ※バケツ塗りの結果はctxに直接書き込まれていくのでここでは重ねない
        ctx.drawImage(imgMask, 0, 0); 
    }

    canvas.onclick = function(e) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
        const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));

        // 最も近い座標ポイントを探す
        let nearest = null;
        let minDist = 50; 
        mapMasterData.forEach(p => {
            const px = (p.x * canvas.width / 100);
            const py = (p.y * canvas.height / 100);
            const d = Math.sqrt((px-x)**2 + (py-y)**2);
            if (d < minDist) { minDist = d; nearest = p; }
        });

        if (nearest) {
            const key = `${nearest.x}-${nearest.y}`;
            const targetRGB = hexToRgb(selectedColor);
            
            // バケツ塗り実行
            floodFill(x, y, targetRGB);
            
            // スコア更新
            if (areaStatus[key] !== selectedColor) {
                if (areaStatus[key]) scores[areaStatus[key]] -= pointsConfig[nearest.lv];
                scores[selectedColor] += pointsConfig[nearest.lv];
                areaStatus[key] = selectedColor;
                updateBoard();
            }
            // 線を常に一番上に表示
            ctx.drawImage(imgMask, 0, 0);
        }
    };

    // バケツ塗り（Flood Fill）エンジン
    function floodFill(startX, startY, fillRGB) {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imageData.data;
        const width = canvas.width;
        const height = canvas.height;

        const startPos = (startY * width + startX) * 4;
        const startR = pixels[startPos];
        const startG = pixels[startPos+1];
        const startB = pixels[startPos+2];

        // 黒い線（境界線）や既に同じ色の場合は塗らない
        if (isBoundary(startR, startG, startB)) return;
        if (startR === fillRGB.r && startG === fillRGB.g && startB === fillRGB.b) return;

        const stack = [[startX, startY]];
        while (stack.length) {
            const [x, y] = stack.pop();
            let curY = y;
            while (curY >= 0 && isSameColor(x, curY, startR, startG, startB)) curY--;
            curY++;

            let reachLeft = false;
            let reachRight = false;
            while (curY < height && isSameColor(x, curY, startR, startG, startB)) {
                const pos = (curY * width + x) * 4;
                pixels[pos] = fillRGB.r;
                pixels[pos+1] = fillRGB.g;
                pixels[pos+2] = fillRGB.b;
                pixels[pos+3] = 200; // 透明度（数字が見えるように）

                if (x > 0) {
                    if (isSameColor(x - 1, curY, startR, startG, startB)) {
                        if (!reachLeft) { stack.push([x - 1, curY]); reachLeft = true; }
                    } else { reachLeft = false; }
                }
                if (x < width - 1) {
                    if (isSameColor(x + 1, curY, startR, startG, startB)) {
                        if (!reachRight) { stack.push([x + 1, curY]); reachRight = true; }
                    } else { reachRight = false; }
                }
                curY++;
            }
        }
        ctx.putImageData(imageData, 0, 0);

        function isSameColor(x, y, sr, sg, sb) {
            const p = (y * width + x) * 4;
            // 境界線（黒系）でなければ同じ領域とみなして塗る
            if (pixels[p] < 80 && pixels[p+1] < 80 && pixels[p+2] < 80) return false;
            // 元の色と似ているか、あるいは既に白っぽい場所なら塗る
            return true; 
        }
    }

    function isBoundary(r, g, b) {
        return r < 80 && g < 80 && b < 80;
    }

    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
    }

    function updateBoard() {
        const board = document.getElementById('score-board');
        board.innerHTML = '';
        let has = false;
        colorList.forEach(c => {
            if (scores[c] > 0) {
                has = true;
                const card = document.createElement('div');
                card.className = 'score-card';
                card.style.borderLeftColor = c;
                card.innerHTML = `<b>${scores[c].toLocaleString()}</b> pt`;
                board.appendChild(card);
            }
        });
        if (!has) board.innerHTML = '領地をタップして占領！';
    }

    function resetMap() {
        if (confirm('リセットしますか？')) location.reload();
    }
</script>
