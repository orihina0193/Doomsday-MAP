<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>領地ポイントシミュレーター</title>
    <style>
        body { font-family: sans-serif; margin: 0; text-align: center; background: #f0f0f0; touch-action: manipulation; }
        #header { background: #333; color: white; padding: 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        #map-container { position: relative; display: inline-block; margin: 10px auto; cursor: crosshair; background: #fff; line-height: 0; }
        #map-image { display: block; max-width: 100%; height: auto; -webkit-user-drag: none; }
        .dot { position: absolute; width: 18px; height: 18px; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: auto; border: 2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.6); z-index: 10; }
        .controls { margin: 10px; padding: 15px; background: white; border-bottom: 1px solid #ddd; }
        .level-selector { margin-bottom: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .level-btn { padding: 10px 15px; border: 2px solid transparent; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; transition: transform 0.1s; }
        .level-btn:active { transform: scale(0.95); }
        .level-btn.active { border-color: #333; box-shadow: 0 0 8px rgba(0,0,0,0.3); }
        .reset-btn { padding: 10px 25px; background: #666; color: white; border: none; border-radius: 5px; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-size: 1.4em; font-weight: bold;">合計: <span id="total-pts">0</span> / 30,000 pt</div>
    <div id="status-msg" style="font-size: 0.9em; color: #ccc; margin-top: 5px;">あと 30,000 pt 必要です</div>
</div>

<div class="controls">
    <div class="level-selector" id="selectors">
        <button class="level-btn active" style="background:#ff4d4d;" onclick="setLv(7, this)">Lv7</button>
        <button class="level-btn" style="background:#ff944d;" onclick="setLv(6, this)">Lv6</button>
        <button class="level-btn" style="background:#ffdb4d; color: #333;" onclick="setLv(5, this)">Lv5</button>
        <button class="level-btn" style="background:#d64dff;" onclick="setLv(4, this)">Lv4</button>
        <button class="level-btn" style="background:#ff4da6;" onclick="setLv(3, this)">Lv3</button>
        <button class="level-btn" style="background:#4da6ff;" onclick="setLv(2, this)">Lv2</button>
        <button class="level-btn" style="background:#ffff4d; color:black;" onclick="setLv(1, this)">Lv1</button>
    </div>
    <button class="reset-btn" onclick="resetMap()">マップをクリア</button>
</div>

<div id="map-container">
    <img id="map-image" src="img/image.png" alt="領地マップ">
</div>

<script>
    const points = { 7: 6000, 6: 4000, 5: 3000, 4: 2000, 3: 600, 2: 200, 1: 100 };
    const colors = { 7:'#ff4d4d', 6:'#ff944d', 5:'#ffdb4d', 4:'#d64dff', 3:'#ff4da6', 2:'#4da6ff', 1:'#ffff4d' };
    
    let currentLv = 7;
    let totalScore = 0;

    const container = document.getElementById('map-container');
    const totalDisplay = document.getElementById('total-pts');
    const statusMsg = document.getElementById('status-msg');

    // レベル選択の切り替え
    function setLv(lv, btn) {
        currentLv = lv;
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // クリックでドットを追加
    container.addEventListener('click', function(e) {
        if (e.target !== document.getElementById('map-image') && e.target !== container) return;
        
        const rect = container.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        addDot(x, y, currentLv);
    });

    function addDot(x, y, lv) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.left = x + '%';
        dot.style.top = y + '%';
        dot.style.backgroundColor = colors[lv];
        
        // もう一度タップで削除
        dot.onclick = (e) => {
            e.stopPropagation();
            container.removeChild(dot);
            updateScore(-points[lv]);
        };

        container.appendChild(dot);
        updateScore(points[lv]);
    }

    function updateScore(val) {
        totalScore += val;
        totalDisplay.innerText = totalScore.toLocaleString();
        
        const remaining = 30000 - totalScore;
        if (remaining > 0) {
            statusMsg.innerText = `あと ${remaining.toLocaleString()} pt 必要です`;
            statusMsg.style.color = "#ccc";
        } else {
            statusMsg.innerText = "★ 目標の30,000pt達成！ ★";
            statusMsg.style.color = "#4dff4d";
        }
    }

    function resetMap() {
        if (!confirm('マップをリセットしてもよろしいですか？')) return;
        const dots = document.querySelectorAll('.dot');
        dots.forEach(d => d.remove());
        totalScore = 0;
        updateScore(0);
    }
</script>

</body>
</html>
