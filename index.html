<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>精密領地シミュレーター v5.0</title>
    <style>
        :root { --panel-width: 280px; }
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; height: 100vh; display: flex; overflow: hidden; }
        .main-wrapper { display: flex; width: 100%; height: 100%; }
        
        #map-outer { flex: 1; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
        #map-container { position: relative; line-height: 0; display: inline-block; }
        #baseImg { display: block; max-width: 100%; max-height: 100vh; width: auto; height: auto; pointer-events: none; }
        #mapCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: crosshair; touch-action: pinch-zoom; }
        
        .side-panel { width: var(--panel-width); background: #222; display: flex; flex-direction: column; flex-shrink: 0; border-left: 1px solid #444; z-index: 20; }
        
        @media (max-width: 800px) {
            body { overflow: auto; }
            .main-wrapper { flex-direction: column; height: auto; min-height: 100vh; }
            #map-outer { height: 60vh; flex: none; }
            .side-panel { width: 100%; height: auto; min-height: 40vh; border-left: none; border-top: 1px solid #444; }
            #score-container { overflow-y: visible !important; }
        }

        .controls { padding: 12px; border-bottom: 1px solid #444; background: #222; position: sticky; top: 0; z-index: 30; }
        .row { display: flex; flex-direction: column; gap: 8px; }
        .mode-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
        
        #colorSelect { background: #444; color: white; border: 1px solid #666; padding: 12px; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }
        .mode-btn { background: #444; color: white; border: 1px solid #666; padding: 10px; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .mode-btn.active { background: #0066cc; border-color: white; box-shadow: 0 0 5px white; }
        .btn-save { background: #28a745; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-reset { background: #555; color: #ddd; border: 1px solid #666; padding: 8px; border-radius: 4px; font-size: 14px; cursor: pointer; margin-top: 4px; }

        #score-container { flex: 1; overflow-y: auto; padding: 12px; background: #111; }
        .score-list { display: flex; flex-direction: column; gap: 6px; }
        .score-card { background: #333; padding: 10px 15px; border-radius: 6px; border-left: 8px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .score-info { font-size: 14px; font-weight: bold; color: #eee; }
        .score-val { font-size: 18px; font-weight: bold; color: #ffd700; text-align: right; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div id="map-outer">
        <div id="map-container">
            <img id="baseImg" src="img/image.png">
            <canvas id="mapCanvas"></canvas>
        </div>
    </div>
    <div class="side-panel">
        <div class="controls">
            <div class="row">
                <select id="colorSelect" onchange="updateSelectedColor(this.value)"></select>
                <div class="mode-group">
                    <button id="mode-paint" class="mode-btn active" onclick="setMode('paint')">塗り</button>
                    <button id="mode-start" class="mode-btn" onclick="setMode('start')">🚩</button>
                    <button id="mode-home" class="mode-btn" onclick="setMode('home')">🏰</button>
                </div>
                <button class="btn-save" onclick="generateShortUrl()">保存URLを発行</button>
                <button class="btn-reset" onclick="if(confirm('リセットしますか？')) location.replace(location.pathname)">リセット</button>
            </div>
        </div>
        <div id="score-container">
            <div id="score-board" class="score-list"></div>
        </div>
    </div>
</div>

    const pointsConfig = { 7: 6000, 6: 4000, 5: 3000, 4: 2000, 3: 600, 2: 200, 1: 100 };
    const colorList = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990', '#dcbeff', '#9A6324', '#fffac8', '#800000', '#aaffc3', '#808000', '#ffd8b1', '#000075', '#a9a9a9'];
    const colorNames = ['レッド', 'グリーン', 'イエロー', 'ブルー', 'オレンジ', 'パープル', 'スカイ', 'マゼンタ', 'ライム', 'ピンク', 'ティール', 'ラベンダー', 'ブラウン', 'ベージュ', 'マルーン', 'ミント', 'オリーブ', 'アプリコット', 'ネイビー', 'グレー'];

    const canvas = document.getElementById('mapCanvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
    const paintCanvas = document.createElement('canvas'), pCtx = paintCanvas.getContext('2d', { willReadFrequently: true });
    let selectedColor = colorList[0], currentMode = 'paint', scores = {}, counts = {}, areaStatus = {};
    let startPositions = [], homePos = null, maskData = null, maskImg = new Image();

    maskImg.crossOrigin = "Anonymous";
    maskImg.src = "img/mask.png";
    maskImg.onload = () => {
        canvas.width = paintCanvas.width = maskImg.width;
        canvas.height = paintCanvas.height = maskImg.height;
        const tCanvas = document.createElement('canvas'); tCanvas.width = maskImg.width; tCanvas.height = maskImg.height;
        const tCtx = tCanvas.getContext('2d'); tCtx.drawImage(maskImg, 0, 0);
        maskData = tCtx.getImageData(0, 0, tCanvas.width, tCanvas.height).data;
        initUI();
    };

    function initUI() {
        colorList.forEach(c => { scores[c] = 0; counts[c] = 0; });
        const select = document.getElementById('colorSelect');
        colorList.forEach((color, i) => { const opt = document.createElement('option'); opt.value = color; opt.textContent = colorNames[i]; select.appendChild(opt); });
        updateSelectedColor(colorList[0]); loadFromUrl(); updateBoard(); render();
    }

    function updateSelectedColor(val) { selectedColor = val; document.getElementById('colorSelect').style.backgroundColor = val; setMode('paint'); }
    function setMode(mode) { currentMode = mode; document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); document.getElementById('mode-' + mode).classList.add('active'); }

    let activePointers = new Set(), clickTimer = null;
    canvas.addEventListener('pointerdown', (e) => {
        activePointers.add(e.pointerId);
        if (activePointers.size > 1) { if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; } return; }
        if (clickTimer) clearTimeout(clickTimer);
        clickTimer = setTimeout(() => { if (activePointers.size === 1) handleCanvasAction(e); clickTimer = null; }, 50);
    });
    canvas.addEventListener('pointerup', (e) => { activePointers.delete(e.pointerId); });

    function handleCanvasAction(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
        const x = Math.floor((e.clientX - rect.left) * scaleX), y = Math.floor((e.clientY - rect.top) * scaleY);
        
        // 🚩モード：複数設置 & 重複タップで削除
        if (currentMode === 'start') {
            const idx = startPositions.findIndex(p => Math.sqrt((p.x-x)**2 + (p.y-y)**2) < 40);
            if (idx > -1) { startPositions.splice(idx, 1); } 
            else { startPositions.push({x, y}); }
            render(); return;
        }
        
        if (currentMode === 'home') { homePos = {x, y}; render(); return; }
        
        const pos = (y * canvas.width + x) * 4;
        if (maskData && maskData[pos + 3] === 0) {
            let nearest = null, minDist = 9999; 
            mapMasterData.forEach(p => { 
                const px = p.x * canvas.width / 100, py = p.y * canvas.height / 100; 
                const d = Math.sqrt((px-x)**2 + (py-y)**2); 
                if (d < minDist) { minDist = d; nearest = p; } 
            });
            if (nearest && minDist < 60) applyPaint(nearest, x, y);
        }
    }

    function applyPaint(nearest, x, y) {
        const key = `${nearest.x}-${nearest.y}`;
        const rgb = hexToRgb(selectedColor);
        if (areaStatus[key] === selectedColor) { 
            floodFill(x, y, {r:0,g:0,b:0}, true); 
            scores[selectedColor] -= pointsConfig[nearest.lv]; 
            counts[selectedColor] -= 1; 
            delete areaStatus[key]; 
        } else {
            if (areaStatus[key]) { 
                scores[areaStatus[key]] -= pointsConfig[nearest.lv]; 
                counts[areaStatus[key]] -= 1; 
            }
            floodFill(x, y, rgb, false); 
            scores[selectedColor] += pointsConfig[nearest.lv]; 
            counts[selectedColor] += 1; 
            areaStatus[key] = selectedColor;
        }
        updateBoard(); render();
    }

    function floodFill(startX, startY, fillRGB, isCancel) {
        const imgData = pCtx.getImageData(0, 0, paintCanvas.width, paintCanvas.height), pixels = imgData.data, width = paintCanvas.width, height = paintCanvas.height;
        const stack = [[Math.floor(startX), Math.floor(startY)]], targetAlpha = isCancel ? 0 : 160;
        while (stack.length) {
            const [cx, cy] = stack.pop(), p = (cy * width + cx) * 4;
            if (!isCancel && pixels[p+3] > 0) continue; if (isCancel && pixels[p+3] === 0) continue;
            pixels[p] = fillRGB.r; pixels[p+1] = fillRGB.g; pixels[p+2] = fillRGB.b; pixels[p+3] = targetAlpha;
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => { 
                const nx = cx + dx, ny = cy + dy; 
                if (nx >= 0 && nx < width && ny >= 0 && ny < height && maskData[(ny * width + nx) * 4 + 3] === 0) stack.push([nx, ny]); 
            });
        }
        pCtx.putImageData(imgData, 0, 0);
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(paintCanvas, 0, 0); ctx.drawImage(maskImg, 0, 0);
        ctx.font = "bold 48px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        startPositions.forEach(p => ctx.fillText("🚩", p.x, p.y)); 
        if (homePos) ctx.fillText("🏰", homePos.x, homePos.y);
    }

    function updateBoard() {
        const board = document.getElementById('score-board');
        board.innerHTML = '';
        let activeAlliances = [];
        colorList.forEach((c, i) => {
            if (counts[c] > 0) {
                activeAlliances.push({ color: c, name: colorNames[i], count: counts[c], score: scores[c] });
            }
        });
        activeAlliances.sort((a, b) => b.score - a.score);
        activeAlliances.forEach(all => {
            const card = document.createElement('div');
            card.className = 'score-card';
            card.style.borderLeftColor = all.color;
            card.innerHTML = `<div class="score-info">${all.name} (${all.count}枚)</div><div class="score-val">${all.score.toLocaleString()}</div>`;
            board.appendChild(card);
        });
        if (activeAlliances.length === 0) board.innerHTML = '<div style="text-align:center; color:#666; padding-top:20px;">領地をタップ</div>';
    }

    function hexToRgb(hex) { return { r: parseInt(hex.slice(1,3), 16), g: parseInt(hex.slice(3,5), 16), b: parseInt(hex.slice(5,7), 16) }; }

    function generateShortUrl() {
        const data = { s: startPositions, h: homePos, a: Object.entries(areaStatus).map(([k, c]) => [k, colorList.indexOf(c)]) };
        const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
        const longUrl = window.location.href.split('?')[0] + "?data=" + encoded;
        const callbackName = "isgd_callback_" + Date.now();
        window[callbackName] = function(res) { if (res.shorturl) { navigator.clipboard.writeText(res.shorturl).then(() => alert("URLをコピーしました！")); } else { alert("発行失敗"); } delete window[callbackName]; };
        const script = document.createElement("script"); script.src = `https://is.gd/create.php?format=json&callback=${callbackName}&url=${encodeURIComponent(longUrl)}`; document.body.appendChild(script);
    }

    function loadFromUrl() {
        const params = new URLSearchParams(window.location.search), encoded = params.get('data'); if (!encoded) return;
        try {
            const data = JSON.parse(decodeURIComponent(atob(encoded))); 
            startPositions = Array.isArray(data.s) ? data.s : (data.s ? [data.s] : []);
            homePos = data.h;
            data.a.forEach(([key, colorIdx]) => { 
                const [kx, ky] = key.split('-').map(Number); 
                const master = mapMasterData.find(m => m.x === kx && m.y === ky); 
                if (master) { selectedColor = colorList[colorIdx]; applyPaint(master, master.x * canvas.width / 100, master.y * canvas.height / 100); } 
            });
            updateSelectedColor(colorList[0]);
        } catch(e) { console.error(e); }
    }
</script>
