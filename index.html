<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>精密領地シミュレーター v2.6</title>
    <style>
        /* 画面全体の固定 */
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; text-align: center; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .controls { background: #222; padding: 8px 5px; border-bottom: 1px solid #444; flex-shrink: 0; z-index: 100; }
        .row { display: flex; justify-content: center; align-items: center; gap: 6px; flex-wrap: wrap; }
        
        #colorSelect { background: #444; color: white; border: 1px solid #666; padding: 6px; border-radius: 4px; font-size: 14px; font-weight: bold; min-width: 100px; text-shadow: 1px 1px 2px #000; }
        .mode-btn { background: #444; color: white; border: 1px solid #666; padding: 6px 12px; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .mode-btn.active { background: #0066cc; border-color: white; box-shadow: 0 0 5px white; }
        
        #score-container { background: #222; border-top: 1px solid #444; padding: 6px; flex-shrink: 0; max-height: 20vh; overflow-y: auto; }
        #score-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        .score-card { background: #333; padding: 4px 8px; border-radius: 4px; font-size: 11px; border-left: 4px solid transparent; text-align: left; min-width: 85px; }
        .score-card b { font-size: 13px; display: block; }

        /* 地図エリア：スマホは標準スクロール、PCはドラッグ */
        #map-outer { 
            flex: 1; position: relative; background: #000; 
            overflow: auto; /* スマホのスクロールを有効化 */
            -webkit-overflow-scrolling: touch; 
            display: flex; align-items: flex-start; justify-content: flex-start;
        }
        #map-container { position: relative; line-height: 0; display: inline-block; margin: auto; }
        #baseImg { display: block; width: auto; height: auto; max-width: none; }
        /* touch-action: autoにしてスマホの標準挙動を邪魔しない */
        #mapCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; touch-action: auto; }

        .btn-reset { background: #600; font-size: 11px; padding: 4px 8px; }
    </style>
</head>
<body>

<div class="controls">
    <div class="row">
        <select id="colorSelect" onchange="updateSelectedColor(this.value)"></select>
        <button id="mode-paint" class="mode-btn active" onclick="setMode('paint')">塗り</button>
        <button id="mode-start" class="mode-btn" onclick="setMode('start')">🚩</button>
        <button id="mode-home" class="mode-btn" onclick="setMode('home')">🏰</button>
        <button class="mode-btn btn-reset" onclick="if(confirm('リセット？')) location.reload()">Reset</button>
    </div>
</div>

<div id="map-outer">
    <div id="map-container">
        <img id="baseImg" src="img/image.png">
        <canvas id="mapCanvas"></canvas>
    </div>
</div>

<div id="score-container">
    <div id="score-board">領地をタップして開始</div>
</div>

},{"x":57.97,"y":29.01,"lv":3},{"x":65.9,"y":28.15,"lv":3},{"x":43.72,"y":65.69,"lv":4},{"x":55.79,"y":66.62,"lv":4},{"x":66.19,"y":58.6,"lv":4},{"x":33.97,"y":57.09,"lv":4},{"x":34.04,"y":42.91,"lv":4},{"x":42.7,"y":34.24,"lv":4},{"x":57.83,"y":34.6,"lv":4},{"x":65.39,"y":46.49,"lv":4},{"x":41.61,"y":58.67,"lv":5},{"x":41.46,"y":42.41,"lv":5},{"x":58.92,"y":42.62,"lv":5},{"x":59.28,"y":59.17,"lv":5},{"x":50.84,"y":58.6,"lv":6},{"x":49.75,"y":41.55,"lv":6},{"x":50.12,"y":49.93,"lv":7}];
    const pointsConfig = { 7: 6000, 6: 4000, 5: 3000, 4: 2000, 3: 600, 2: 200, 1: 100 };
    const colorList = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990', '#dcbeff', '#9A6324', '#fffac8', '#800000', '#aaffc3', '#808000', '#ffd8b1', '#000075', '#a9a9a9'];
    const colorNames = ['レッド', 'グリーン', 'イエロー', 'ブルー', 'オレンジ', 'パープル', 'スカイ', 'マゼンタ', 'ライム', 'ピンク', 'ティール', 'ラベンダー', 'ブラウン', 'ベージュ', 'マルーン', 'ミント', 'オリーブ', 'アプリコット', 'ネイビー', 'グレー'];

    const outer = document.getElementById('map-outer');
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const paintCanvas = document.createElement('canvas');
    const pCtx = paintCanvas.getContext('2d', { willReadFrequently: true });
    
    let selectedColor = colorList[0];
    let currentMode = 'paint';
    let scores = {};
    let counts = {};
    let areaStatus = {};
    let startPos = null;
    let homePos = null;
    let maskData = null;
    let maskImg = new Image();

    // PC用ドラッグ制御
    let isMouseDown = false;
    let dragActive = false;
    let sX, sY, sL, sT;

    maskImg.crossOrigin = "Anonymous";
    maskImg.src = "img/mask.png";
    maskImg.onload = () => {
        canvas.width = paintCanvas.width = maskImg.width;
        canvas.height = paintCanvas.height = maskImg.height;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = maskImg.width; tempCanvas.height = maskImg.height;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(maskImg, 0, 0);
        maskData = tCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height).data;
        initUI();
    };

    // PC用：マウスドラッグでのスクロール（スマホに影響しないよう制御）
    outer.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        isMouseDown = true; dragActive = false;
        sX = e.pageX - outer.offsetLeft;
        sY = e.pageY - outer.offsetTop;
        sL = outer.scrollLeft;
        sT = outer.scrollTop;
    });
    window.addEventListener('mouseup', () => { isMouseDown = false; });
    outer.addEventListener('mousemove', (e) => {
        if (!isMouseDown) return;
        const x = e.pageX - outer.offsetLeft;
        const y = e.pageY - outer.offsetTop;
        if (Math.abs(x - sX) > 5 || Math.abs(y - sY) > 5) {
            dragActive = true; // 5px以上動いたらドラッグとみなす
            outer.scrollLeft = sL - (x - sX);
            outer.scrollTop = sT - (y - sY);
        }
    });

    function initUI() {
        colorList.forEach(c => { scores[c] = 0; counts[c] = 0; });
        const select = document.getElementById('colorSelect');
        colorList.forEach((color, i) => {
            const opt = document.createElement('option');
            opt.value = color;
            opt.textContent = `■ ${colorNames[i]}`;
            select.appendChild(opt);
        });
        updateSelectedColor(colorList[0]);
        updateBoard(); render();
    }

    function updateSelectedColor(val) {
        selectedColor = val;
        const select = document.getElementById('colorSelect');
        select.style.backgroundColor = val;
        select.style.color = "white"; 
        setMode('paint');
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        if(mode !== 'reset') document.getElementById('mode-' + mode).classList.add('active');
    }

    // クリック/タップ判定
    canvas.addEventListener('click', function(e) {
        if (dragActive) return; // ドラッグ移動した後は塗らない

        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = Math.floor((e.clientX - rect.left) * scaleX);
        const y = Math.floor((e.clientY - rect.top) * scaleY);

        if (currentMode === 'start') { startPos = {x, y}; render(); return; }
        if (currentMode === 'home') { homePos = {x, y}; render(); return; }

        const pos = (y * canvas.width + x) * 4;
        if (maskData && maskData[pos + 3] === 0) {
            let nearest = null; let minDist = 9999; 
            mapMasterData.forEach(p => {
                const px = p.x * canvas.width / 100; const py = p.y * canvas.height / 100;
                const d = Math.sqrt((px-x)**2 + (py-y)**2);
                if (d < minDist) { minDist = d; nearest = p; }
            });
            if (nearest) {
                const key = `${nearest.x}-${nearest.y}`;
                const rgb = hexToRgb(selectedColor);
                if (areaStatus[key] === selectedColor) {
                    floodFill(x, y, {r:0,g:0,b:0}, true);
                    scores[selectedColor] -= pointsConfig[nearest.lv];
                    counts[selectedColor] -= 1;
                    delete areaStatus[key];
                } else {
                    if (areaStatus[key]) {
                        scores[areaStatus[key]] -= pointsConfig[nearest.lv];
                        counts[areaStatus[key]] -= 1;
                    }
                    floodFill(x, y, rgb, false);
                    scores[selectedColor] += pointsConfig[nearest.lv];
                    counts[selectedColor] += 1;
                    areaStatus[key] = selectedColor;
                }
                updateBoard(); render();
            }
        }
    });

    function floodFill(startX, startY, fillRGB, isCancel) {
        const imgData = pCtx.getImageData(0, 0, paintCanvas.width, paintCanvas.height);
        const pixels = imgData.data;
        const width = paintCanvas.width; const height = paintCanvas.height;
        const stack = [[startX, startY]];
        const targetAlpha = isCancel ? 0 : 160;
        while (stack.length) {
            const [cx, cy] = stack.pop();
            const p = (cy * width + cx) * 4;
            if (!isCancel && pixels[p+3] > 0) continue;
            if (isCancel && pixels[p+3] === 0) continue;
            pixels[p] = fillRGB.r; pixels[p+1] = fillRGB.g; pixels[p+2] = fillRGB.b; pixels[p+3] = targetAlpha;
            const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
            for (const [dx, dy] of dirs) {
                const nx = cx + dx, ny = cy + dy;
                if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                    const np = (ny * width + nx) * 4;
                    if (maskData[np+3] === 0) {
                        if (isCancel && pixels[np+3] > 0) stack.push([nx, ny]);
                        if (!isCancel && pixels[np+3] === 0) stack.push([nx, ny]);
                    }
                }
            }
        }
        pCtx.putImageData(imgData, 0, 0);
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(paintCanvas, 0, 0);
        ctx.drawImage(maskImg, 0, 0);
        ctx.font = "bold 48px sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        if (startPos) ctx.fillText("🚩", startPos.x, startPos.y);
        if (homePos) ctx.fillText("🏰", homePos.x, homePos.y);
    }

    function hexToRgb(hex) {
        return { r: parseInt(hex.slice(1,3), 16), g: parseInt(hex.slice(3,5), 16), b: parseInt(hex.slice(5,7), 16) };
    }

    function updateBoard() {
        const board = document.getElementById('score-board');
        board.innerHTML = '';
        let hasData = false;
        colorList.forEach((c, i) => {
            if (counts[c] > 0) {
                hasData = true;
                const card = document.createElement('div');
                card.className = 'score-card';
                card.style.borderLeftColor = c;
                card.innerHTML = `${colorNames[i]} (${counts[c]}箇所)<b>${scores[c].toLocaleString()} pt</b>`;
                board.appendChild(card);
            }
        });
        if (!hasData) board.innerHTML = '領地をタップして開始';
    }
</script>
</body>
</html>
