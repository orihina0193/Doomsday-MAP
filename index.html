<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【座標データ作成】領地シミュレーター</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #222; color: white; text-align: center; }
        #header { background: #333; padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #444; }
        #map-container { position: relative; display: inline-block; margin: 10px auto; background: #000; line-height: 0; cursor: crosshair; }
        #map-image { display: block; max-width: 100%; height: auto; user-select: none; -webkit-user-drag: none; }
        
        /* 登録済みの印 */
        .dot { position: absolute; width: 22px; height: 22px; border-radius: 50%; transform: translate(-50%, -50%); 
               color: white; font-size: 10px; font-weight: bold; line-height: 22px; text-align: center;
               border: 1px solid white; box-shadow: 0 0 5px black; pointer-events: none; z-index: 10; }
        
        .controls { background: #333; padding: 15px; border-top: 2px solid #444; }
        .lv-btns { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        .lv-btn { padding: 10px; border-radius: 5px; border: 2px solid transparent; cursor: pointer; font-weight: bold; }
        .lv-btn.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px rgba(255,255,255,0.5); }
        
        .actions { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
        textarea { width: 90%; height: 80px; margin-top: 10px; background: #111; color: #0f0; }
        
        /* レベル別の色分け */
        .lv1 { background: #555; } .lv2 { background: #4da6ff; } .lv3 { background: #ff4da6; }
        .lv4 { background: #d64dff; } .lv5 { background: #ffdb4d; color: black; }
        .lv6 { background: #ff944d; } .lv7 { background: #ff4d4d; }
    </style>
</head>
<body>

<div id="header">
    <div id="status">現在のモード: <span id="mode-text" style="color:yellow; font-weight:bold;">Lv1の登録</span></div>
    <div style="font-size: 0.8em; color: #aaa;">マップをタップして座標を登録。登録済みは丸が表示されます。</div>
</div>

<div id="map-container">
    <img id="map-image" src="img/image.png" alt="Map">
</div>

<div class="controls">
    <div class="lv-btns">
        <button class="lv-btn lv1 active" onclick="setLv(1)">Lv1</button>
        <button class="lv-btn lv2" onclick="setLv(2)">Lv2</button>
        <button class="lv-btn lv3" onclick="setLv(3)">Lv3</button>
        <button class="lv-btn lv4" onclick="setLv(4)">Lv4</button>
        <button class="lv-btn lv5" onclick="setLv(5)">Lv5</button>
        <button class="lv-btn lv6" onclick="setLv(6)">Lv6</button>
        <button class="lv-btn lv7" onclick="setLv(7)">Lv7</button>
    </div>

    <div class="actions">
        <button onclick="saveToBrowser()" style="background:#28a745; color:white;">保存(ブラウザ内)</button>
        <button onclick="undo()" style="background:#666; color:white;">1つ消す</button>
        <button onclick="copyData()" style="background:#007bff; color:white;">全データをコピーしてGeminiへ</button>
        <button onclick="clearAll()" style="background:#dc3545; color:white;">全削除</button>
    </div>
    <textarea id="output" readonly placeholder="ここにデータが出力されます"></textarea>
</div>

<script>
    let currentLv = 1;
    let mapData = JSON.parse(localStorage.getItem('savedMapData')) || [];

    const container = document.getElementById('map-container');
    const output = document.getElementById('output');

    // 起動時に保存済みデータを表示
    window.onload = () => {
        mapData.forEach(d => renderDot(d.x, d.y, d.lv));
        updateModeText();
    };

    function setLv(lv) {
        currentLv = lv;
        document.querySelectorAll('.lv-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.lv${lv}`).classList.add('active');
        updateModeText();
    }

    function updateModeText() {
        document.getElementById('mode-text').innerText = `Lv${currentLv}の登録`;
    }

    container.addEventListener('click', (e) => {
        const rect = container.getBoundingClientRect();
        const x = parseFloat(((e.clientX - rect.left) / rect.width * 100).toFixed(2));
        const y = parseFloat(((e.clientY - rect.top) / rect.height * 100).toFixed(2));

        const newData = { x, y, lv: currentLv };
        mapData.push(newData);
        renderDot(x, y, currentLv);
        saveToBrowser(); // 自動でブラウザ保存
    });

    function renderDot(x, y, lv) {
        const dot = document.createElement('div');
        dot.className = `dot lv${lv}`;
        dot.style.left = x + '%';
        dot.style.top = y + '%';
        dot.innerText = lv;
        container.appendChild(dot);
    }

    function saveToBrowser() {
        localStorage.setItem('savedMapData', JSON.stringify(mapData));
    }

    function undo() {
        if (mapData.length > 0) {
            mapData.pop();
            container.removeChild(container.lastChild);
            saveToBrowser();
        }
    }

    function copyData() {
        output.value = JSON.stringify(mapData);
        output.select();
        document.execCommand('copy');
        alert("全データをコピーしました！そのままGeminiのチャットに貼り付けてください。");
    }

    function clearAll() {
        if(confirm("ブラウザに保存したデータもすべて消去しますか？")) {
            mapData = [];
            localStorage.removeItem('savedMapData');
            location.reload();
        }
    }
</script>

</body>
</html>
