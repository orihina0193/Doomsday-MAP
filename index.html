<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>精密領地シミュレーター v3.9</title>
    <style>
        :root { --panel-width: 300px; }
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; height: 100vh; overflow: hidden; }

        .main-wrapper { display: flex; flex-direction: row; height: 100vh; width: 100vw; }

        /* 地図表示エリア */
        #map-outer { 
            flex: 1; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 10px;
            overflow: hidden;
        }

        /* ここが重なりの要：画像のサイズに自動で合わせる */
        #map-container { 
            position: relative; 
            display: inline-block; /* 中身（画像）のサイズに合わせる */
            max-width: 100%;
            max-height: 100%;
        }

        #baseImg { 
            display: block;
            max-width: 100%; 
            max-height: 100%; 
            width: auto;
            height: auto;
            pointer-events: none; /* 下の画像は触らせない */
        }

        #mapCanvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 10; 
            touch-action: none;
            cursor: crosshair;
        }

        /* サイドパネル */
        .side-panel { width: var(--panel-width); background: #222; display: flex; flex-direction: column; flex-shrink: 0; border-left: 1px solid #444; }
        
        @media (max-width: 800px) { 
            .main-wrapper { flex-direction: column; }
            #map-outer { flex: 0 0 60%; }
            .side-panel { width: 100%; flex: 0 0 40%; border-left: none; border-top: 1px solid #444; }
        }

        /* UI */
        .controls { padding: 12px; border-bottom: 1px solid #444; flex-shrink: 0; }
        .row { display: flex; flex-direction: column; gap: 8px; }
        .mode-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
        #colorSelect { background: #444; color: white; border: 1px solid #666; padding: 10px; border-radius: 4px; font-size: 14px; font-weight: bold; width: 100%; cursor: pointer; }
        .mode-btn { background: #444; color: white; border: 1px solid #666; padding: 10px; border-radius: 4px; font-size: 13px; cursor: pointer; }
        .mode-btn.active { background: #0066cc; border-color: white; box-shadow: 0 0 5px white; }
        .btn-save { background: #28a745; color: white; border: none; padding: 12px; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-reset { background: #600; font-size: 10px; padding: 5px; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 5px; opacity: 0.7; }

        #score-container { flex: 1; overflow-y: auto; padding: 8px; background: #111; }
        .score-list { display: flex; flex-direction: column; gap: 6px; }
        .score-card { background: #333; padding: 8px; border-radius: 4px; border-left: 4px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .score-info { font-size: 11px; }
        .score-val { font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div id="map-outer">
        <div id="map-container">
            <img id="baseImg" src="img/image.png">
            <canvas id="mapCanvas"></canvas>
        </div>
    </div>

    <div class="side-panel">
        <div class="controls">
            <div class="row">
                <select id="colorSelect" onchange="updateSelectedColor(this.value)"></select>
                <div class="mode-group">
                    <button id="mode-paint" class="mode-btn active" onclick="setMode('paint')">塗り</button>
                    <button id="mode-start" class="mode-btn" onclick="setMode('start')">🚩</button>
                    <button id="mode-home" class="mode-btn" onclick="setMode('home')">🏰</button>
                </div>
                <button class="btn-save" onclick="generateShortUrl()">短縮URLを発行</button>
                <button class="btn-reset" onclick="if(confirm('リセット？')) location.replace(location.pathname)">Reset</button>
            </div>
        </div>
        <div id="score-container">
            <div id="score-board" class="score-list"></div>
        </div>
    </div>
</div>

    {"x":12.01,"y":3.18,"lv":1},{"x":20.81,"y":3.25,"lv":1},{"x":29.53,"y":3.39,"lv":1},{"x":38.33,"y":2.82,"lv":1},{"x":47.43,"y":2.75,"lv":1},{"x":54.99,"y":2.68,"lv":1},{"x":63.93,"y":2.75,"lv":1},{"x":70.19,"y":3.04,"lv":1},{"x":77.75,"y":3.18,"lv":1},{"x":86.7,"y":3.11,"lv":1},{"x":4.44,"y":14.78,"lv":1},{"x":95.93,"y":13.64,"lv":1},{"x":3.86,"y":22.23,"lv":1},{"x":3.43,"y":30.18,"lv":1},{"x":3.28,"y":38.85,"lv":1},{"x":2.99,"y":46.37,"lv":1},{"x":3.64,"y":54.25,"lv":1},{"x":3.28,"y":61.7,"lv":1},{"x":2.99,"y":69.51,"lv":1},{"x":3.28,"y":77.46,"lv":1},{"x":3.43,"y":85.96,"lv":1},{"x":11.43,"y":97.35,"lv":1},{"x":20.95,"y":96.99,"lv":1},{"x":29.75,"y":97.35,"lv":1},{"x":38.41,"y":97.49,"lv":1},{"x":46.48,"y":97.28,"lv":1},{"x":54.63,"y":97.42,"lv":1},{"x":62.7,"y":96.99,"lv":1},{"x":71.28,"y":96.85,"lv":1},{"x":80.08,"y":96.92,"lv":1},{"x":87.86,"y":96.85,"lv":1},{"x":97.17,"y":87.18,"lv":1},{"x":96.81,"y":78.94,"lv":1},{"x":96.95,"y":69.77,"lv":1},{"x":96.81,"y":62.18,"lv":1},{"x":97.1,"y":54.3,"lv":1},{"x":96.73,"y":45.56,"lv":1},{"x":97.32,"y":37.89,"lv":1},{"x":96.95,"y":30.59,"lv":1},{"x":96.3,"y":21.49,"lv":1}];

    const pointsConfig = { 7: 6000, 6: 4000, 5: 3000, 4: 2000, 3: 600, 2: 200, 1: 100 };
    const colorList = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990', '#dcbeff', '#9A6324', '#fffac8', '#800000', '#aaffc3', '#808000', '#ffd8b1', '#000075', '#a9a9a9'];
    const colorNames = ['レッド', 'グリーン', 'イエロー', 'ブルー', 'オレンジ', 'パープル', 'スカイ', 'マゼンタ', 'ライム', 'ピンク', 'ティール', 'ラベンダー', 'ブラウン', 'ベージュ', 'マルーン', 'ミント', 'オリーブ', 'アプリコット', 'ネイビー', 'グレー'];

    const canvas = document.getElementById('mapCanvas'), ctx = canvas.getContext('2d', { willReadFrequently: true });
    const paintCanvas = document.createElement('canvas'), pCtx = paintCanvas.getContext('2d', { willReadFrequently: true });
    
    let selectedColor = colorList[0], currentMode = 'paint', scores = {}, counts = {}, areaStatus = {};
    let startPos = null, homePos = null, maskData = null, maskImg = new Image();

    maskImg.crossOrigin = "Anonymous";
    maskImg.src = "img/mask.png";
    maskImg.onload = () => {
        canvas.width = paintCanvas.width = maskImg.width;
        canvas.height = paintCanvas.height = maskImg.height;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = maskImg.width; tempCanvas.height = maskImg.height;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(maskImg, 0, 0);
        maskData = tCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height).data;
        initUI();
    };

    function initUI() {
        colorList.forEach(c => { scores[c] = 0; counts[c] = 0; });
        const select = document.getElementById('colorSelect');
        colorList.forEach((color, i) => {
            const opt = document.createElement('option');
            opt.value = color; opt.textContent = `■ ${colorNames[i]}`;
            select.appendChild(opt);
        });
        updateSelectedColor(colorList[0]);
        loadFromUrl();
        updateBoard(); render();
    }

    function updateSelectedColor(val) {
        selectedColor = val;
        document.getElementById('colorSelect').style.backgroundColor = val;
        setMode('paint');
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mode-' + mode).classList.add('active');
    }

    canvas.onclick = function(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = Math.floor((e.clientX - rect.left) * scaleX);
        const y = Math.floor((e.clientY - rect.top) * scaleY);

        if (currentMode === 'start') { startPos = {x, y}; render(); return; }
        if (currentMode === 'home') { homePos = {x, y}; render(); return; }

        const pos = (y * canvas.width + x) * 4;
        if (maskData && maskData[pos + 3] === 0) {
            let nearest = null, minDist = 9999; 
            mapMasterData.forEach(p => {
                const px = p.x * canvas.width / 100, py = p.y * canvas.height / 100;
                const d = Math.sqrt((px-x)**2 + (py-y)**2);
                if (d < minDist) { minDist = d; nearest = p; }
            });
            if (nearest && minDist < 60) applyPaint(nearest, x, y);
        }
    };

    function applyPaint(nearest, x, y) {
        const key = `${nearest.x}-${nearest.y}`;
        const rgb = hexToRgb(selectedColor);
        if (areaStatus[key] === selectedColor) {
            floodFill(x, y, {r:0,g:0,b:0}, true);
            scores[selectedColor] -= pointsConfig[nearest.lv];
            counts[selectedColor] -= 1;
            delete areaStatus[key];
        } else {
            if (areaStatus[key]) {
                scores[areaStatus[key]] -= pointsConfig[nearest.lv];
                counts[areaStatus[key]] -= 1;
            }
            floodFill(x, y, rgb, false);
            scores[selectedColor] += pointsConfig[nearest.lv];
            counts[selectedColor] += 1;
            areaStatus[key] = selectedColor;
        }
        updateBoard(); render();
    }

    function floodFill(startX, startY, fillRGB, isCancel) {
        const imgData = pCtx.getImageData(0, 0, paintCanvas.width, paintCanvas.height);
        const pixels = imgData.data, width = paintCanvas.width, height = paintCanvas.height;
        const stack = [[Math.floor(startX), Math.floor(startY)]];
        const targetAlpha = isCancel ? 0 : 160;
        while (stack.length) {
            const [cx, cy] = stack.pop();
            const p = (cy * width + cx) * 4;
            if (!isCancel && pixels[p+3] > 0) continue;
            if (isCancel && pixels[p+3] === 0) continue;
            pixels[p] = fillRGB.r; pixels[p+1] = fillRGB.g; pixels[p+2] = fillRGB.b; pixels[p+3] = targetAlpha;
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                const nx = cx + dx, ny = cy + dy;
                if (nx >= 0 && nx < width && ny >= 0 && ny < height && maskData[(ny * width + nx) * 4 + 3] === 0) stack.push([nx, ny]);
            });
        }
        pCtx.putImageData(imgData, 0, 0);
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(paintCanvas, 0, 0);
        ctx.drawImage(maskImg, 0, 0);
        ctx.font = "bold 48px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        if (startPos) ctx.fillText("🚩", startPos.x, startPos.y);
        if (homePos) ctx.fillText("🏰", homePos.x, homePos.y);
    }

    function updateBoard() {
        const board = document.getElementById('score-board');
        board.innerHTML = '';
        let hasData = false;
        colorList.forEach((c, i) => {
            if (counts[c] > 0) {
                hasData = true;
                const card = document.createElement('div');
                card.className = 'score-card'; card.style.borderLeftColor = c;
                card.innerHTML = `<div class="score-info"><b>${colorNames[i]}</b> (${counts[c]})</div><div class="score-val">${scores[c].toLocaleString()}</div>`;
                board.appendChild(card);
            }
        });
        if (!hasData) board.innerHTML = '<div style="text-align:center; color:#666; width:100%;">開始</div>';
    }

    function hexToRgb(hex) { return { r: parseInt(hex.slice(1,3), 16), g: parseInt(hex.slice(3,5), 16), b: parseInt(hex.slice(5,7), 16) }; }

    function generateShortUrl() {
        const data = { s: startPos, h: homePos, a: Object.entries(areaStatus).map(([k, c]) => [k, colorList.indexOf(c)]) };
        const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
        const longUrl = window.location.href.split('?')[0] + "?data=" + encoded;
        const callbackName = "isgd_callback_" + Date.now();
        window[callbackName] = function(res) {
            if (res.shorturl) {
                navigator.clipboard.writeText(res.shorturl).then(() => alert("URL発行済み：\n" + res.shorturl));
            } else { alert("失敗"); }
            delete window[callbackName];
        };
        const script = document.createElement("script");
        script.src = `https://is.gd/create.php?format=json&callback=${callbackName}&url=${encodeURIComponent(longUrl)}`;
        document.body.appendChild(script);
    }

    function loadFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const encoded = params.get('data');
        if (!encoded) return;
        try {
            const data = JSON.parse(decodeURIComponent(atob(encoded)));
            startPos = data.s; homePos = data.h;
            data.a.forEach(([key, colorIdx]) => {
                const [kx, ky] = key.split('-').map(Number);
                const master = mapMasterData.find(m => m.x === kx && m.y === ky);
                if (master) {
                    selectedColor = colorList[colorIdx];
                    applyPaint(master, master.x * canvas.width / 100, master.y * canvas.height / 100);
                }
            });
            updateSelectedColor(colorList[0]);
        } catch(e) { console.error(e); }
    }
</script>
</body>
