<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>精密領地シミュレーター v3.0 Share</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; text-align: center; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .controls { background: #222; padding: 8px 5px; border-bottom: 1px solid #444; flex-shrink: 0; z-index: 100; }
        .row { display: flex; justify-content: center; align-items: center; gap: 6px; flex-wrap: wrap; }
        #colorSelect { background: #444; color: white; border: 1px solid #666; padding: 6px; border-radius: 4px; font-size: 14px; font-weight: bold; min-width: 100px; }
        .mode-btn { background: #444; color: white; border: 1px solid #666; padding: 6px 12px; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .mode-btn.active { background: #0066cc; border-color: white; box-shadow: 0 0 5px white; }
        .btn-share { background: #28a745; border-color: #28a745; font-weight: bold; }
        #score-container { background: #222; border-top: 1px solid #444; padding: 6px; flex-shrink: 0; max-height: 20vh; overflow-y: auto; }
        #score-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        .score-card { background: #333; padding: 4px 8px; border-radius: 4px; font-size: 11px; border-left: 4px solid transparent; text-align: left; min-width: 85px; }
        #map-outer { flex: 1; position: relative; background: #000; overflow: auto; display: flex; align-items: center; justify-content: center; }
        #map-container { position: relative; line-height: 0; display: inline-block; }
        #baseImg { display: block; width: auto; height: auto; max-width: 100vw; max-height: 100%; }
        #mapCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; touch-action: auto; }
        .btn-reset { background: #600; font-size: 11px; padding: 4px 8px; }
    </style>
</head>
<body>

<div class="controls">
    <div class="row">
        <select id="colorSelect" onchange="updateSelectedColor(this.value)"></select>
        <button id="mode-paint" class="mode-btn active" onclick="setMode('paint')">塗り</button>
        <button id="mode-start" class="mode-btn" onclick="setMode('start')">🚩</button>
        <button id="mode-home" class="mode-btn" onclick="setMode('home')">🏰</button>
        <button class="mode-btn btn-share" onclick="saveToUrl()">保存・共有用URLコピー</button>
        <button class="mode-btn btn-reset" onclick="if(confirm('リセット？')) location.reload()">Reset</button>
    </div>
</div>

<div id="map-outer">
    <div id="map-container">
        <img id="baseImg" src="img/image.png">
        <canvas id="mapCanvas"></canvas>
    </div>
</div>

<div id="score-container">
    <div id="score-board">領地をタップして開始</div>
</div>

<script>
    // --- Ikumiさんの最新座標データ (40点) ---
    const mapMasterData = [{"x":12.01,"y":3.18,"lv":1},{"x":20.81,"y":3.25,"lv":1},{"x":29.53,"y":3.39,"lv":1},{"x":38.33,"y":2.82,"lv":1},{"x":47.43,"y":2.75,"lv":1},{"x":54.99,"y":2.68,"lv":1},{"x":63.93,"y":2.75,"lv":1},{"x":70.19,"y":3.04,"lv":1},{"x":77.75,"y":3.18,"lv":1},{"x":86.7,"y":3.11,"lv":1},{"x":4.44,"y":14.78,"lv":1},{"x":95.93,"y":13.64,"lv":1},{"x":3.86,"y":22.23,"lv":1},{"x":3.43,"y":30.18,"lv":1},{"x":3.28,"y":38.85,"lv":1},{"x":2.99,"y":46.37,"lv":1},{"x":3.64,"y":54.25,"lv":1},{"x":3.28,"y":61.7,"lv":1},{"x":2.99,"y":69.51,"lv":1},{"x":3.28,"y":77.46,"lv":1},{"x":3.43,"y":85.96,"lv":1},{"x":11.43,"y":97.35,"lv":1},{"x":20.95,"y":96.99,"lv":1},{"x":29.75,"y":97.35,"lv":1},{"x":38.41,"y":97.49,"lv":1},{"x":46.48,"y":97.28,"lv":1},{"x":54.63,"y":97.42,"lv":1},{"x":62.7,"y":96.99,"lv":1},{"x":71.28,"y":96.85,"lv":1},{"x":80.08,"y":96.92,"lv":1},{"x":87.86,"y":96.85,"lv":1},{"x":97.17,"y":87.18,"lv":1},{"x":96.81,"y":78.94,"lv":1},{"x":96.95,"y":69.77,"lv":1},{"x":96.81,"y":62.18,"lv":1},{"x":97.1,"y":54.3,"lv":1},{"x":96.73,"y":45.56,"lv":1},{"x":97.32,"y":37.89,"lv":1},{"x":96.95,"y":30.59,"lv":1},{"x":96.3,"y":21.49,"lv":1}];
    
    const pointsConfig = { 1: 100 };
    const colorList = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4', '#f032e6', '#bfef45', '#fabed4', '#469990', '#dcbeff', '#9A6324', '#fffac8', '#800000', '#aaffc3', '#808000', '#ffd8b1', '#000075', '#a9a9a9'];
    const colorNames = ['レッド', 'グリーン', 'イエロー', 'ブルー', 'オレンジ', 'パープル', 'スカイ', 'マゼンタ', 'ライム', 'ピンク', 'ティール', 'ラベンダー', 'ブラウン', 'ベージュ', 'マルーン', 'ミント', 'オリーブ', 'アプリコット', 'ネイビー', 'グレー'];

    const outer = document.getElementById('map-outer');
    const canvas = document.getElementById('mapCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const paintCanvas = document.createElement('canvas');
    const pCtx = paintCanvas.getContext('2d', { willReadFrequently: true });
    
    let selectedColor = colorList[0];
    let currentMode = 'paint';
    let scores = {};
    let counts = {};
    let areaStatus = {};
    let startPos = null, homePos = null, maskData = null;
    let maskImg = new Image();
    let isMouseDown = false, dragActive = false, sX, sY, sL, sT;

    maskImg.crossOrigin = "Anonymous";
    maskImg.src = "img/image.png"; 
    maskImg.onload = () => {
        canvas.width = paintCanvas.width = maskImg.width;
        canvas.height = paintCanvas.height = maskImg.height;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = maskImg.width; tempCanvas.height = maskImg.height;
        const tCtx = tempCanvas.getContext('2d');
        tCtx.drawImage(maskImg, 0, 0);
        maskData = tCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height).data;
        initUI();
        loadFromUrl(); 
    };

    function saveToUrl() {
        const data = { a: areaStatus, s: startPos, h: homePos };
        const json = JSON.stringify(data);
        const encoded = btoa(unescape(encodeURIComponent(json)));
        const url = window.location.origin + window.location.pathname + "?d=" + encoded;
        navigator.clipboard.writeText(url).then(() => {
            alert("共有用URLをコピーしました！短縮サイトで短くして使ってね。");
        });
    }

    function loadFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const encoded = params.get('d');
        if (!encoded) return;
        try {
            const json = decodeURIComponent(escape(atob(encoded)));
            const data = JSON.parse(json);
            if (data.s) startPos = data.s;
            if (data.h) homePos = data.h;
            for (const key in data.a) {
                const color = data.a[key];
                const coords = key.split('-');
                const master = mapMasterData.find(m => m.x == coords[0] && m.y == coords[1]);
                if (master) {
                    selectedColor = color;
                    applyPaintLogic(master, key, false);
                }
            }
            updateBoard(); render();
        } catch (e) { console.error("データ復元失敗", e); }
    }

    function initUI() {
        colorList.forEach(c => { scores[c] = 0; counts[c] = 0; });
        const select = document.getElementById('colorSelect');
        colorList.forEach((color, i) => {
            const opt = document.createElement('option');
            opt.value = color;
            opt.textContent = `■ ${colorNames[i]}`;
            select.appendChild(opt);
        });
        updateSelectedColor(colorList[0]);
        updateBoard(); render();
    }

    function updateSelectedColor(val) {
        selectedColor = val;
        document.getElementById('colorSelect').style.backgroundColor = val;
        setMode('paint');
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        if(mode !== 'reset') document.getElementById('mode-' + mode).classList.add('active');
    }

    outer.addEventListener('mousedown', (e) => { if(e.button===0){ isMouseDown=true; dragActive=false; sX=e.pageX-outer.offsetLeft; sY=e.pageY-outer.offsetTop; sL=outer.scrollLeft; sT=outer.scrollTop; }});
    window.addEventListener('mouseup', () => isMouseDown = false);
    outer.addEventListener('mousemove', (e) => { if(!isMouseDown) return; const x=e.pageX-outer.offsetLeft, y=e.pageY-outer.offsetTop; if(Math.abs(x-sX)>5||Math.abs(y-sY)>5){ dragActive=true; outer.scrollLeft=sL-(x-sX); outer.scrollTop=sT-(y-sY); }});

    canvas.onclick = function(e) {
        if (dragActive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
        const x = Math.floor((e.clientX - rect.left) * scaleX), y = Math.floor((e.clientY - rect.top) * scaleY);

        let nearest = null, minDist = 9999; 
        mapMasterData.forEach(p => {
            const px = p.x * canvas.width / 100, py = p.y * canvas.height / 100;
            const d = Math.sqrt((px-x)**2 + (py-y)**2);
            if (d < minDist) { minDist = d; nearest = p; }
        });

        if (nearest) {
            const key = `${nearest.x}-${nearest.y}`;
            if (currentMode === 'start') { startPos = {x, y}; }
            else if (currentMode === 'home') { homePos = {x, y}; }
            applyPaintLogic(nearest, key, true);
            updateBoard(); render();
        }
    };

    function applyPaintLogic(nearest, key, toggle) {
        const rgb = hexToRgb(selectedColor);
        if (toggle && areaStatus[key] === selectedColor) {
            floodFill(nearest.x * canvas.width / 100, nearest.y * canvas.height / 100, {r:0,g:0,b:0}, true);
            scores[selectedColor] -= pointsConfig[nearest.lv];
            counts[selectedColor] -= 1;
            delete areaStatus[key];
        } else {
            if (areaStatus[key]) {
                const oldColor = areaStatus[key];
                scores[oldColor] -= pointsConfig[nearest.lv];
                counts[oldColor] -= 1;
            }
            floodFill(nearest.x * canvas.width / 100, nearest.y * canvas.height / 100, rgb, false);
            scores[selectedColor] += pointsConfig[nearest.lv];
            counts[selectedColor] += 1;
            areaStatus[key] = selectedColor;
        }
    }

    function floodFill(startX, startY, fillRGB, isCancel) {
        const imgData = pCtx.getImageData(0, 0, paintCanvas.width, paintCanvas.height);
        const pixels = imgData.data, width = paintCanvas.width, height = paintCanvas.height;
        const stack = [[Math.floor(startX), Math.floor(startY)]];
        const targetAlpha = isCancel ? 0 : 160;
        while (stack.length) {
            const [cx, cy] = stack.pop();
            const p = (cy * width + cx) * 4;
            if (!isCancel && pixels[p+3] > 0) continue;
            if (isCancel && pixels[p+3] === 0) continue;
            pixels[p] = fillRGB.r; pixels[p+1] = fillRGB.g; pixels[p+2] = fillRGB.b; pixels[p+3] = targetAlpha;
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                const nx = cx + dx, ny = cy + dy;
                if (nx >= 0 && nx < width && ny >= 0 && ny < height && maskData[(ny * width + nx) * 4 + 3] === 0) stack.push([nx, ny]);
            });
        }
        pCtx.putImageData(imgData, 0, 0);
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(paintCanvas, 0, 0);
        ctx.drawImage(maskImg, 0, 0);
        ctx.font = "bold 48px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        if (startPos) ctx.fillText("🚩", startPos.x, startPos.y);
        if (homePos) ctx.fillText("🏰", homePos.x, homePos.y);
    }

    function hexToRgb(hex) { return { r: parseInt(hex.slice(1,3), 16), g: parseInt(hex.slice(3,5), 16), b: parseInt(hex.slice(5,7), 16) }; }

    function updateBoard() {
        const board = document.getElementById('score-board');
        board.innerHTML = '';
        let hasData = false;
        colorList.forEach((c, i) => {
            if (counts[c] > 0) {
                hasData = true;
                const card = document.createElement('div');
                card.className = 'score-card'; card.style.borderLeftColor = c;
                card.innerHTML = `${colorNames[i]} (${counts[c]})<b>${scores[c].toLocaleString()} pt</b>`;
                board.appendChild(card);
            }
        });
        if (!hasData) board.innerHTML = '領地をタップして開始';
    }
</script>
</body>
</html>
